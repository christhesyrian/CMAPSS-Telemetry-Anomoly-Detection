dataset:
  slug: "palbha/cmapss-jet-engine-simulated-data"
  raw_path: "data/raw"
  processed_path: "data/processed"
  features_path: "data/features"
  subset: "FD001"
  anomaly_threshold: 30

features:
  rolling_window: 10

artifacts:
  scaler_path: "artifacts/scalers/scaler_FD001.joblib"
  model_path: "artifacts/models"

models:
  random_state: 42
  isolation_forest:
    n_estimators: 100
    contamination: 0.05
  pca_reconstruction:
    n_components: 10
    percentile: 95.0

reports:
  metrics_path: "reports/metrics"
  tables_path: "reports/tables"